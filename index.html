<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2125166334282472"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PulsoMX - Las últimas noticias de México actualizadas al instante. Política, deportes, economía y más.">
    <meta name="keywords" content="noticias mexico, ultimas noticias, noticias hoy, mexico noticias">
    <meta name="robots" content="index, follow">
    <meta name="author" content="PulsoMX">
    <meta property="og:title" content="PulsoMX | Últimas Noticias de México">
    <meta property="og:description" content="Las noticias más importantes de México, actualizadas automáticamente.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://daniel00998888.github.io/PulsoMX/">
    <title>PulsoMX | Últimas Noticias de México</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700;900&family=Source+Sans+3:ital,wght=0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --rojo: #c0152a;
            --rojo-oscuro: #8b0f1e;
            --amarillo: #f5b800;
            --gris: #f4f4f2;
            --texto: #1a1a2e;
            --texto-suave: #6b7280;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Source Sans 3', sans-serif; background: var(--gris); color: var(--texto); min-width: 320px; overflow-x: hidden; }
        img { max-width: 100%; height: auto; display: block; }

        /* HEADER */
        header { background: var(--rojo); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; gap: 12px; }
        .logo { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 900; color: white; text-decoration: none; white-space: nowrap; }
        .logo span { color: var(--amarillo); }
        .header-nav { display: flex; gap: 14px; }
        .header-nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .header-nav a:hover { color: var(--amarillo); }

        /* LAYOUT PRINCIPAL */
        .main-container { max-width: 1200px; margin: 20px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
        @media (max-width: 960px) { .main-container { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* GRID DE NOTICIAS */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .news-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; color: inherit; transition: transform 0.2s; display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .news-card img { width: 100%; height: 180px; object-fit: cover; }
        .news-card-body { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .news-card-body .fecha { font-size: 0.75rem; color: var(--rojo); font-weight: 700; margin-bottom: 6px; display: block; }
        .news-card-body h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 900; line-height: 1.3; color: var(--texto); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar-widget { background: white; border-radius: 10px; padding: 16px; margin-bottom: 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        .sidebar-title { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 900; border-bottom: 2px solid var(--rojo); padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .sidebar-news-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; }
        .sidebar-news-item:last-child { border-bottom: none; }
        .sidebar-news-item img { width: 68px; height: 52px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .sidebar-news-item h4 { font-size: 0.78rem; font-weight: 700; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .sidebar-news-item span { font-size: 0.63rem; color: var(--rojo); font-weight: 700; display: block; margin-bottom: 2px; }

        /* ANUNCIOS */
        .ad-in-grid { background: #f9f9f9; border: 1px dashed #ddd; min-height: 150px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }

        /* FOOTER */
        footer { background: var(--texto); color: rgba(255,255,255,0.7); margin-top: 40px; padding: 24px 16px; text-align: center; font-size: 0.8rem; }
        footer a { color: var(--amarillo); text-decoration: none; }
        .footer-links { display: flex; justify-content: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">⚡ PULSO<span>MX</span></a>
            <nav class="header-nav">
                <a href="privacidad.html">Privacidad</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <main>
            <div id="news-grid" class="news-grid">
                <p style="color:#6b7280; padding:20px; text-align:center; grid-column: 1 / -1;">Cargando últimas noticias...</p>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-widget">
                <p class="sidebar-title">Últimas Noticias</p>
                <div id="sidebar-list"></div>
            </div>
        </aside>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">Inicio</a>
            <a href="privacidad.html">Política de Privacidad</a>
            <a href="terminos.html">Términos de Uso</a>
            <a href="contacto.html">Contacto</a>
        </div>
        <p>© 2026 PulsoMX — Noticias de México actualizadas automáticamente.</p>
    </footer>

    <script>
        // 1. Detectar si venimos de NetGamer con un ID de usuario válido (uid)
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        
        // Si hay una sesión activa de NetGamer, creamos la query string para inyectarla en los enlaces
        const complementoUid = uid ? `&uid=${uid}` : '';

        // 2. Cargar las noticias desde tu archivo JSON local
        fetch("data/noticias.json")
            .then(res => res.json())
            .then(data => {
                const noticias = data;
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';

                // Volteamos el array para que las noticias más nuevas aparezcan arriba
                noticias.reverse().forEach((n, index) => {
                    // Mantenemos la estructura original de inyección de anuncios cada ciertos bloques
                    if (index === 2 || index === 6) {
                        grid.innerHTML += `<div class="ad-in-grid"></div>`;
                    }
                    
                    // Inyectamos la tarjeta de noticia vinculando dinámicamente el id de la noticia y el uid del usuario
                    grid.innerHTML += `
                        <a href="noticia.html?id=${n.id}${complementoUid}" class="news-card">
                            <img src="${n.imagen}" alt="${n.titulo}" loading="lazy">
                            <div class="news-card-body">
                                <div>
                                    <span class="fecha">${n.fecha}</span>
                                    <h3>${n.titulo}</h3>
                                </div>
                            </div>
                        </a>`;
                });

                // 3. Poblar la lista lateral (Sidebar) con las últimas 5 publicaciones
                const sidebar = document.getElementById('sidebar-list');
                sidebar.innerHTML = ''; // Limpieza de seguridad
                
                noticias.slice(0, 5).forEach(n => {
                    sidebar.innerHTML += `
                        <a href="noticia.html?id=${n.id}${complementoUid}" class="sidebar-news-item">
                            <img src="${n.imagen}" alt="${n.titulo}" loading="lazy">
                            <div>
                                <span>${n.fecha}</span>
                                <h4>${n.titulo}</h4>
                            </div>
                        </a>`;
                });
            })
            .catch(() => {
                document.getElementById('news-grid').innerHTML = `
                    <p style="color:#999; padding:20px; grid-column:1/-1; text-align:center;">
                        Esperando la primera actualización automática o error al conectar con los datos...
                    </p>`;
            });

        // Limpiador básico para mitigar código HTML residual dentro del JSON
        function limpiarHTML(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || div.innerText || '';
        }
    </script>
</body>
</html>
